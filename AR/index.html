<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AR.js Example</title>
  <script src="aframe.min.js"></script>
  <script src="aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; } 
    #arjsDebugUIContainer { display: none; } 
    #selector-container { position: absolute; left: 50%; transform: translateX(-50%); bottom: 12px; z-index: 20; background: rgba(255,255,255,0.95); padding: 10px 12px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); display: flex; gap: 8px; align-items: center; touch-action: manipulation; }
    label { font-size: 14px; color: #111; } 
    select { font-size: 16px; padding: 8px; border-radius: 6px; } 
    #hint { position: absolute; left: 8px; top: 8px; z-index: 15; background: rgba(0,0,0,0.45); color: #fff; padding: 6px 8px; border-radius: 6px; font-size: 13px; }
  </style>
</head>
<body>
    <div id="selector-container">
        <label for="shape-select">Scegli oggetto: </label>
        <select id="shape-select">
            <option value="box">Box</option>
            <option value="earth">Mondo Rotante</option>
        </select>
    </div>
  <a-scene embedded arjs="sourceType: webcam;">
    <a-marker preset="hiro">
        <a-entity id="earth-entity" visible="false">
            <a-sphere src="earth_atmos_4096.jpg" radius="0.5" position="0.2 1 -2.5" segments-height="53">
            <a-animation attribute="rotation"
                    dur="6000"
                    from= "0 0 0"
                    to="0 360 0"
                    easing= "linear"     
                    repeat="indefinite"></a-animation>
            </a-sphere>
        </a-entity>
        <a-entity id="box-entity" scale="0.5 0.5 0.5" position="0.2 1 -2.5">
            <a-box 
              position="0 0.5 1" 
              depth="1" 
              height="1" 
              width="1" 
              color="red"
              animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
           </a-box>
        </a-entity>
      <a-text value="Benvenuto!" position='-0.5 1.8 -2' color='black' rotation='-90 -90 90'></a-text>
    </a-marker>
    <a-entity camera="fov: 80" position="0 1.6 0"></a-entity>
  </a-scene>

  <script>
    const select = document.getElementById('shape-select');
    const earthEntity = document.getElementById('earth-entity');
    const boxEntity = document.getElementById('box-entity');
    select.addEventListener('change', function() {
      if (this.value === 'earth') {
        earthEntity.setAttribute('visible', 'true');
        boxEntity.setAttribute('visible', 'false');
      } else {
        earthEntity.setAttribute('visible', 'false');
        boxEntity.setAttribute('visible', 'true');
      }
    });
  </script>
</body>
</html>
